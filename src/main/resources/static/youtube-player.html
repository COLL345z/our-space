<!DOCTYPE html>
<html><body style="margin:0;background:#000;">
<div id="player"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
var player, isReady = false;
function getVideoId() {
    return new URLSearchParams(window.location.search).get('v');
}
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%', width: '100%',
        videoId: getVideoId(),
        playerVars: {playsinline:1, rel:0, controls:1, autoplay:1},
        events: {
            'onReady': function() { isReady = true; },
            'onStateChange': function(e) { AndroidBridge.onPlayerStateChange(e.data); },
            'onError': function(e) { AndroidBridge.onPlayerError(e.data); }
        }
    });
}
function loadVideo(id) { if (isReady && player) player.loadVideoById(id); }
function playVideo() { if (player && isReady) player.playVideo(); }
function pauseVideo() { if (player && isReady) player.pauseVideo(); }
</script>
</body></html>

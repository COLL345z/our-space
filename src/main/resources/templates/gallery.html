<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gallery · Our Space</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #070709;
            --bg-primary: #0c0c11;
            --bg-secondary: #111118;
            --bg-card: #181820;
            --bg-input: #1e1e28;
            --bg-hover: #22222e;
            --accent: #e0a83b;
            --accent-glow: rgba(224, 168, 59, 0.3);
            --accent-soft: rgba(224, 168, 59, 0.08);
            --accent-gradient: linear-gradient(135deg, #e0a83b 0%, #c48f28 60%, #a8781e 100%);
            --text-primary: #eeeef2;
            --text-secondary: #b0b0bb;
            --text-muted: #787882;
            --border-subtle: #1e1e2a;
            --border-card: #1e1e2a;
            --radius-xl: 20px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 8px;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
            --shadow-md: 0 10px 28px rgba(0,0,0,0.5);
            --shadow-sm: 0 4px 14px rgba(0,0,0,0.4);
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4,0,0.2,1);
            --transition-bounce: 0.35s cubic-bezier(0.34,1.56,0.64,1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#2a2a38; border-radius:10px; }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top:0; z-index:10;
            backdrop-filter: blur(8px);
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-icon {
            width:34px; height:34px; border-radius:50%;
            background: var(--accent-gradient);
            display:flex; align-items:center; justify-content:center;
            font-size:0.9rem; color:#000;
            box-shadow:0 4px 16px var(--accent-glow);
        }
        .header h1 { font-size:1.1rem; font-weight:700; }
        .header-stats {
            background: var(--bg-input);
            border:1px solid var(--border-card);
            padding:6px 14px; border-radius:20px;
            font-size:0.8rem; color:var(--text-muted);
        }

        .container { max-width:1100px; margin:0 auto; padding:20px 16px 40px; }

        /* Upload section */
        .upload-section {
            background: var(--bg-card);
            border:1px solid var(--border-card);
            border-radius: var(--radius-xl);
            padding:20px;
            margin-bottom:24px;
        }
        .upload-title {
            font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em;
            color:var(--text-muted); margin-bottom:16px;
        }
        .upload-form { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; }
        .form-group { display:flex; flex-direction:column; gap:5px; }
        .form-group label {
            font-size:0.7rem; font-weight:600; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:0.04em;
        }
        input, select {
            font-family:var(--font); font-size:0.85rem;
            padding:10px 14px; border:1.5px solid var(--border-card);
            border-radius:var(--radius-sm); background:var(--bg-input);
            color:var(--text-primary); outline:none; width:100%;
            transition:all var(--transition-fast);
        }
        input:focus, select:focus { border-color:var(--accent); }
        .file-input-wrapper {
            position:relative; display:flex; align-items:center;
        }
        .file-input-wrapper input[type=file] {
            position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; z-index:2;
        }
        .file-label {
            display:flex; align-items:center; gap:8px;
            padding:10px 16px; background:var(--bg-input);
            border:1.5px dashed var(--border-card);
            border-radius:var(--radius-sm); color:var(--text-secondary);
            font-size:0.85rem; cursor:pointer;
        }
        .file-label:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
        .file-count { font-size:0.75rem; color:var(--text-muted); margin-top:4px; }

        .btn-upload {
            background:var(--accent-gradient); border:none; color:#1a1000;
            font-weight:700; padding:10px 22px; border-radius:var(--radius-sm);
            cursor:pointer; font-size:0.85rem; display:flex; align-items:center; gap:8px;
            box-shadow:0 4px 14px var(--accent-glow);
            transition:all var(--transition-smooth);
            white-space:nowrap;
        }
        .btn-upload:hover { transform:translateY(-2px); filter:brightness(1.08); }

        /* Filter tabs */
        .tabs {
            display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;
        }
        .tab-btn {
            background:var(--bg-card); border:1px solid var(--border-card);
            color:var(--text-secondary); padding:8px 20px; border-radius:30px;
            cursor:pointer; font-size:0.8rem; font-weight:500;
            transition:all var(--transition-fast);
        }
        .tab-btn.active {
            background:var(--accent-soft); border-color:var(--accent);
            color:var(--accent); font-weight:600;
        }

        /* Grid */
        .media-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap:18px;
        }
        .media-card {
            background:var(--bg-card); border:1px solid var(--border-card);
            border-radius:var(--radius-lg); overflow:hidden;
            transition:all var(--transition-smooth); box-shadow:var(--shadow-sm);
            cursor:pointer;
        }
        .media-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
        .media-thumb {
            position:relative; aspect-ratio:16/12; background:#000;
        }
        .media-thumb img, .media-thumb video {
            width:100%; height:100%; object-fit:cover; display:block;
        }
        .media-type-badge {
            position:absolute; top:10px; left:10px;
            background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
            padding:4px 10px; border-radius:20px; font-size:0.7rem;
            display:flex; align-items:center; gap:4px;
        }
        .favorite-btn {
            position:absolute; top:10px; right:10px;
            background:rgba(0,0,0,0.5); border:none; color:#aaa;
            width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:1rem; z-index:5;
            transition:color 0.2s;
        }
        .favorite-btn.active { color: var(--accent); }
        .delete-btn {
            position:absolute; bottom:10px; right:10px;
            background:rgba(0,0,0,0.5); border:none; color:#ff5e5e;
            width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:1rem; opacity:0;
            transition:opacity 0.2s;
        }
        .media-card:hover .delete-btn { opacity:1; }

        /* Fullscreen modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.9);
            backdrop-filter:blur(12px); z-index:100;
            display:none; align-items:center; justify-content:center;
            padding:20px;
        }
        .modal-overlay.active { display:flex; }
        .modal-content {
            max-width:90vw; max-height:90vh;
            border-radius:var(--radius-lg); overflow:hidden;
            position:relative;
        }
        .modal-content img, .modal-content video {
            max-width:90vw; max-height:90vh; object-fit:contain;
            border-radius:var(--radius-lg);
        }
        .modal-close {
            position:absolute; top:12px; right:12px;
            background:rgba(0,0,0,0.6); border:none; color:white;
            width:36px; height:36px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:1.2rem;
        }

        .empty-state {
            grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted);
        }
        .empty-icon {
            width:70px; height:70px; border-radius:50%; background:var(--bg-card);
            border:1px solid var(--border-card); display:flex; align-items:center; justify-content:center;
            margin:0 auto 16px; font-size:1.8rem; color:var(--accent);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon"><i class="fa-solid fa-images"></i></div>
        <h1>Our Gallery</h1>
    </div>
    <div class="header-stats" id="mediaCount">0 memories</div>
</div>

<div class="container">

    <!-- Upload form -->
    <div class="upload-section">
        <div class="upload-title"><i class="fa-solid fa-cloud-arrow-up"></i> Add memories</div>
        <div class="upload-form">
            <div class="form-group" style="flex:1.2;">
                <label>Title</label>
                <input type="text" id="titleInput" placeholder="Sunset at the park...">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Type</label>
                <select id="typeInput">
                    <option value="IMAGE">Image</option>
                    <option value="VIDEO">Video</option>
                </select>
            </div>
            <div class="form-group" style="flex:1.5;">
                <label>Files</label>
                <div class="file-input-wrapper">
                    <input type="file" id="filesInput" accept="image/*,video/*" multiple>
                    <span class="file-label" id="fileLabel"><i class="fa-solid fa-paperclip"></i> Choose files</span>
                </div>
                <div class="file-count" id="fileCount"></div>
            </div>
            <button class="btn-upload" onclick="uploadMedia()"><i class="fa-solid fa-upload"></i> Upload</button>
        </div>
    </div>

    <!-- Filter tabs -->
    <div class="tabs" id="filterTabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="IMAGE">📷 Photos</button>
        <button class="tab-btn" data-filter="VIDEO">🎬 Videos</button>
        <button class="tab-btn" data-filter="favorites">❤️ Favorites</button>
    </div>

    <div class="media-grid" id="mediaGrid">
        <div class="loading-spinner" style="text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-spin"></i></div>
    </div>

</div>

<!-- Fullscreen modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        <div id="modalMediaContainer"></div>
    </div>
</div>

<script>
    // const API = "http://localhost:8080/api/gallery";
    const API = "https://our-space-htoh.onrender.com/api/gallery";
    let allMedia = [];
    let currentFilter = "all";

    // File input change
    document.getElementById("filesInput").addEventListener("change", (e) => {
        const files = e.target.files;
        const label = document.getElementById("fileLabel");
        const count = document.getElementById("fileCount");
        if (files.length > 0) {
            label.innerHTML = `<i class="fa-solid fa-check"></i> ${files.length} file${files.length>1?'s':''} selected`;
            count.textContent = `${files.length} file${files.length>1?'s':''} ready`;
        } else {
            label.innerHTML = `<i class="fa-solid fa-paperclip"></i> Choose files`;
            count.textContent = "";
        }
    });

    // Load data with optional filter
    async function loadMedia() {
        const grid = document.getElementById("mediaGrid");
        grid.innerHTML = '<div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i></div>';
        try {
            let url = API;
            if (currentFilter === "IMAGE" || currentFilter === "VIDEO") {
                url = `${API}/type/${currentFilter}`;
            } else if (currentFilter === "favorites") {
                url = `${API}/favorites`;
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error("Failed");
            allMedia = await res.json();
            renderGrid();
        } catch (e) {
            grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-camera-retro"></i></div><h3>No memories yet</h3><p>Upload your first photo or video.</p></div>`;
            document.getElementById("mediaCount").textContent = "0 memories";
        }
    }

    function renderGrid() {
        const grid = document.getElementById("mediaGrid");
        const countEl = document.getElementById("mediaCount");

        if (!allMedia.length) {
            grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-camera-retro"></i></div><h3>No memories found</h3><p>Try another filter or upload something.</p></div>`;
            countEl.textContent = "0 memories";
            return;
        }

        countEl.textContent = `${allMedia.length} memor${allMedia.length===1?'y':'ies'}`;

        grid.innerHTML = allMedia.map(item => {
            if (!item.fileUrl) return "";
            const isVideo = item.type === "VIDEO";
            const mediaHtml = isVideo
                ? `<video src="${item.fileUrl}" muted></video>`
                : `<img src="${item.fileUrl}" alt="${escapeHTML(item.title || '')}" loading="lazy">`;

            return `
                <div class="media-card" onclick="openModal('${item.id}')">
                    <div class="media-thumb">
                        ${mediaHtml}
                        <div class="media-type-badge">
                            <i class="fa-solid ${isVideo?'fa-video':'fa-image'}"></i>
                            ${isVideo?'Video':'Photo'}
                        </div>
                        <button class="favorite-btn ${item.favorite?'active':''}" onclick="event.stopPropagation(); toggleFavorite(${item.id})">
                            <i class="fa-${item.favorite?'solid':'regular'} fa-heart"></i>
                        </button>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteMedia(${item.id})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = str || "";
        return div.innerHTML;
    }

    // Fullscreen modal
    function openModal(id) {
        const item = allMedia.find(m => m.id == id);
        if (!item) return;
        const container = document.getElementById("modalMediaContainer");
        if (item.type === "VIDEO") {
            container.innerHTML = `<video src="${item.fileUrl}" controls autoplay style="max-width:90vw; max-height:90vh;"></video>`;
        } else {
            container.innerHTML = `<img src="${item.fileUrl}" alt="${escapeHTML(item.title)}" style="max-width:90vw; max-height:90vh;">`;
        }
        document.getElementById("modalOverlay").classList.add("active");
    }
    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("active");
        document.getElementById("modalMediaContainer").innerHTML = "";
    }

    // Toggle favorite
    async function toggleFavorite(id) {
        await fetch(`${API}/${id}/favorite`, { method: "PUT" });
        // Update local array
        const idx = allMedia.findIndex(m => m.id == id);
        if (idx !== -1) allMedia[idx].favorite = !allMedia[idx].favorite;
        renderGrid();
    }

    // Delete
    async function deleteMedia(id) {
       
        await fetch(`${API}/${id}`, { method: "DELETE" });
        allMedia = allMedia.filter(m => m.id !== id);
        renderGrid();
    }

    // Upload multiple files
    async function uploadMedia() {
        const title = document.getElementById("titleInput").value.trim() || "Untitled";
        const type = document.getElementById("typeInput").value;
        const files = document.getElementById("filesInput").files;

        if (files.length === 0) {
            alert("Please select at least one file.");
            return;
        }

        const formData = new FormData();
        formData.append("title", title);
        formData.append("type", type);
        for (let f of files) {
            formData.append("files", f);
        }

        const btn = document.querySelector(".btn-upload");
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

        try {
            const res = await fetch(API, {
                method: "POST",
                body: formData
            });
            if (!res.ok) throw new Error("Upload failed");
            // Clear form
            document.getElementById("titleInput").value = "";
            document.getElementById("filesInput").value = "";
            document.getElementById("fileLabel").innerHTML = '<i class="fa-solid fa-paperclip"></i> Choose files';
            document.getElementById("fileCount").textContent = "";
            await loadMedia();
        } catch (e) {
            alert("Upload failed.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-upload"></i> Upload';
        }
    }

    // Filter tabs
    document.querySelectorAll("#filterTabs .tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#filterTabs .tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            loadMedia();
        });
    });

    // Init
    loadMedia();
</script>
</body>
</html>

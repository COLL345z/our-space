<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gallery · Our Space</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #070709;
            --bg-primary: #0c0c11;
            --bg-secondary: #111118;
            --bg-card: #181820;
            --bg-input: #1e1e28;
            --bg-hover: #22222e;
            --accent: #e0a83b;
            --accent-glow: rgba(224, 168, 59, 0.3);
            --accent-soft: rgba(224, 168, 59, 0.08);
            --accent-gradient: linear-gradient(135deg, #e0a83b 0%, #c48f28 60%, #a8781e 100%);
            --text-primary: #eeeef2;
            --text-secondary: #b0b0bb;
            --text-muted: #787882;
            --border-subtle: #1e1e2a;
            --border-card: #1e1e2a;
            --radius-xl: 20px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 8px;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
            --shadow-md: 0 10px 28px rgba(0,0,0,0.5);
            --shadow-sm: 0 4px 14px rgba(0,0,0,0.4);
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4,0,0.2,1);
            --transition-bounce: 0.35s cubic-bezier(0.34,1.56,0.64,1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#2a2a38; border-radius:10px; }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top:0; z-index:20;
            backdrop-filter: blur(12px);
        }
        .header-left { display:flex; align-items:center; gap:10px; }
        .header-icon {
            width:32px; height:32px; border-radius:50%;
            background: var(--accent-gradient);
            display:flex; align-items:center; justify-content:center;
            font-size:0.8rem; color:#000;
            box-shadow:0 4px 16px var(--accent-glow);
        }
        .header h1 { font-size:1rem; font-weight:700; }
        .header-stats {
            background: var(--bg-input);
            border:1px solid var(--border-card);
            padding:4px 12px; border-radius:20px;
            font-size:0.7rem; color:var(--text-muted);
        }

        .container { max-width:1100px; margin:0 auto; padding:12px 8px 40px; }

        .tabs {
            display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;
            padding:0 4px;
        }
        .tab-btn {
            background:var(--bg-card); border:1px solid var(--border-card);
            color:var(--text-secondary); padding:6px 14px; border-radius:30px;
            cursor:pointer; font-size:0.7rem; font-weight:500;
            transition:all var(--transition-fast);
            white-space:nowrap;
        }
        .tab-btn:hover { background:var(--bg-hover); }
        .tab-btn.active {
            background:var(--accent-soft); border-color:var(--accent);
            color:var(--accent); font-weight:600;
        }

        .upload-fab {
            position:fixed; bottom:24px; right:16px; z-index:30;
            background: var(--accent-gradient); border:none; color:#1a1000;
            width:56px; height:56px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:1.4rem; cursor:pointer;
            box-shadow:0 8px 24px var(--accent-glow);
            transition:all var(--transition-bounce);
        }
        .upload-fab:hover { transform:scale(1.05); }

        .upload-modal {
            position:fixed; inset:0; z-index:100;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(12px);
            display:none; align-items:flex-end; justify-content:center;
            padding:20px;
        }
        .upload-modal.active { display:flex; }
        .upload-sheet {
            background:var(--bg-card);
            border:1px solid var(--border-card);
            border-radius:var(--radius-xl) var(--radius-xl) 0 0;
            padding:24px 20px 32px;
            width:100%; max-width:500px;
            max-height:80vh;
            overflow-y:auto;
            animation:slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform:translateY(100%); opacity:0; }
            to { transform:translateY(0); opacity:1; }
        }
        .upload-sheet h3 {
            font-size:0.9rem; font-weight:700; margin-bottom:16px;
            display:flex; align-items:center; gap:8px;
        }
        .upload-sheet .form-group {
            margin-bottom:14px;
        }
        .upload-sheet .form-group label {
            display:block; font-size:0.65rem; font-weight:600;
            color:var(--text-muted); text-transform:uppercase;
            letter-spacing:0.04em; margin-bottom:4px;
        }
        .upload-sheet input {
            font-family:var(--font); font-size:0.85rem;
            padding:10px 14px; border:1.5px solid var(--border-card);
            border-radius:var(--radius-sm); background:var(--bg-input);
            color:var(--text-primary); outline:none; width:100%;
            transition:all var(--transition-fast);
        }
        .upload-sheet input:focus {
            border-color:var(--accent);
        }
        .file-picker {
            display:flex; align-items:center; gap:10px;
            padding:12px 16px; background:var(--bg-input);
            border:1.5px dashed var(--border-card);
            border-radius:var(--radius-sm); color:var(--text-secondary);
            font-size:0.85rem; cursor:pointer;
            transition:all var(--transition-fast);
        }
        .file-picker:hover { border-color:var(--accent); color:var(--accent); }
        .file-picker input { display:none; }
        .upload-actions {
            display:flex; gap:10px; margin-top:16px;
        }
        .upload-actions button {
            flex:1; padding:12px; border-radius:var(--radius-sm);
            font-weight:600; font-size:0.85rem; cursor:pointer;
            transition:all var(--transition-fast);
            font-family:var(--font);
        }
        .btn-cancel-upload {
            background:none; border:1px solid var(--border-card);
            color:var(--text-secondary);
        }
        .btn-submit-upload {
            background:var(--accent-gradient); border:none;
            color:#1a1000; box-shadow:0 4px 14px var(--accent-glow);
        }
        .btn-submit-upload:disabled {
            opacity:0.5; cursor:not-allowed;
        }

        .media-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap:4px;
        }

        .media-item {
            position:relative;
            aspect-ratio:1/1;
            background:var(--bg-card);
            overflow:hidden;
            cursor:pointer;
            border-radius:4px;
            transition:transform 0.15s ease;
        }
        .media-item:active { transform:scale(0.95); }
        .media-item img, .media-item video {
            width:100%; height:100%; object-fit:cover;
            display:block;
        }
        /* ⭐ FIXED: overlay invisible AND non-clickable when hidden */
        .media-item .overlay {
            position:absolute; inset:0;
            background:rgba(0,0,0,0);
            display:flex; align-items:center; justify-content:center;
            opacity:0;
            pointer-events:none;  /* ← THIS FIXES THE ACCIDENTAL DELETE BUG */
            transition:all 0.2s ease;
        }
        .media-item .overlay.show {
            background:rgba(0,0,0,0.5);
            opacity:1;
            pointer-events:auto;  /* ← clickable only when visible */
        }
        .media-item .overlay .actions {
            display:flex; gap:12px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .media-item .overlay button {
            background:rgba(255,255,255,0.15);
            border:none; color:white;
            width:40px; height:40px;
            border-radius:50%;
            font-size:0.95rem; cursor:pointer;
            backdrop-filter:blur(4px);
            transition:all 0.2s ease;
        }
        .media-item .overlay button:hover {
            background:rgba(255,255,255,0.25);
            transform:scale(1.1);
        }
        .media-item .overlay .delete-btn { color:#ff5e5e; }
        .media-item .overlay .share-btn { color:#5db8d4; }
        .media-item .overlay .memory-btn { color:var(--accent); }
        .media-item .overlay .fav-btn.active { color:var(--accent); }
        .media-item .badge {
            position:absolute; top:6px; left:6px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(4px);
            padding:2px 8px; border-radius:12px;
            font-size:0.55rem; color:#aaa;
            display:flex; align-items:center; gap:4px;
            pointer-events:none;
        }
        .media-item .favorite-indicator {
            position:absolute; top:6px; right:6px;
            color:var(--accent); font-size:0.8rem;
            text-shadow:0 0 10px rgba(224,168,59,0.5);
            pointer-events:none;
            display:none;
        }
        .media-item .favorite-indicator.show { display:block; }
        .media-item.selected {
            outline:3px solid var(--accent);
            outline-offset:-3px;
        }
        .media-item.selected .selection-check {
            display:flex !important;
        }
        .selection-check {
            position:absolute; top:6px; left:6px;
            width:24px; height:24px; border-radius:50%;
            background:var(--accent); color:#000;
            display:none; align-items:center; justify-content:center;
            font-size:0.7rem; font-weight:700;
            z-index:5;
        }

        .selection-toolbar {
            position:fixed; bottom:0; left:0; right:0;
            background:var(--bg-secondary);
            border-top:1px solid var(--border-card);
            padding:12px 16px;
            display:none;
            align-items:center;
            justify-content:space-between;
            z-index:40;
            backdrop-filter:blur(12px);
        }
        .selection-toolbar.active { display:flex; }
        .selection-toolbar .count { font-size:0.85rem; font-weight:600; }
        .selection-toolbar .actions { display:flex; gap:8px; flex-wrap:wrap; }
        .selection-toolbar .actions button {
            background:none; border:none; color:var(--text-secondary);
            font-size:0.75rem; cursor:pointer; padding:6px 10px;
            border-radius:6px; transition:all 0.2s;
            display:flex; align-items:center; gap:5px;
            font-family:var(--font);
            white-space:nowrap;
        }
        .selection-toolbar .actions button:hover { background:var(--bg-hover); }
        .selection-toolbar .actions .delete-selected { color:#ff5e5e; }
        .selection-toolbar .actions .share-selected { color:#5db8d4; }
        .selection-toolbar .actions .memory-selected { color:var(--accent); }

        .viewer-overlay {
            position:fixed; inset:0; z-index:50;
            background:rgba(0,0,0,0.95);
            backdrop-filter:blur(20px);
            display:none;
            align-items:center; justify-content:center;
            padding:20px;
        }
        .viewer-overlay.active { display:flex; }
        .viewer-content {
            position:relative;
            max-width:95vw; max-height:90vh;
            display:flex; align-items:center; justify-content:center;
        }
        .viewer-content img, .viewer-content video {
            max-width:95vw; max-height:85vh;
            object-fit:contain;
            border-radius:8px;
        }
        .viewer-close {
            position:absolute; top:10px; right:10px;
            background:rgba(0,0,0,0.5); border:none;
            color:white; width:40px; height:40px;
            border-radius:50%; font-size:1.2rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .viewer-nav {
            position:absolute; top:50%; transform:translateY(-50%);
            background:rgba(0,0,0,0.3); border:none;
            color:white; width:40px; height:40px;
            border-radius:50%; font-size:1.2rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .viewer-nav.prev { left:10px; }
        .viewer-nav.next { right:10px; }

        .long-press-hint {
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.8);
            backdrop-filter:blur(8px);
            padding:8px 16px; border-radius:20px;
            font-size:0.7rem; color:var(--text-muted);
            z-index:25;
            display:none;
            animation:fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0% { opacity:0; transform:translateX(-50%) translateY(10px); }
            20% { opacity:1; transform:translateX(-50%) translateY(0); }
            80% { opacity:1; transform:translateX(-50%) translateY(0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
        }

        .empty-state {
            grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted);
        }
        .empty-state .icon { font-size:3rem; margin-bottom:12px; opacity:0.5; }

        .toast {
            position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.85);
            backdrop-filter:blur(8px);
            padding:12px 24px; border-radius:12px;
            font-size:0.85rem; color:var(--text-primary);
            z-index:60;
            display:none;
            text-align:center;
            border:1px solid var(--border-card);
            max-width:90%;
        }
        .toast.show {
            display:block;
            animation:toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity:0; transform:translateX(-50%) translateY(20px); }
            to { opacity:1; transform:translateX(-50%) translateY(0); }
        }

        @media (min-width: 600px) {
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:6px; }
        }
        @media (min-width: 900px) {
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:8px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon"><i class="fa-solid fa-images"></i></div>
        <h1>Gallery</h1>
    </div>
    <div class="header-stats" id="mediaCount">0 items</div>
</div>

<div class="container">
    <div class="tabs" id="filterTabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="IMAGE">📷 Photos</button>
        <button class="tab-btn" data-filter="VIDEO">🎬 Videos</button>
        <button class="tab-btn" data-filter="favorites">❤️ Favorites</button>
    </div>
    <div class="media-grid" id="mediaGrid"></div>
</div>

<button class="upload-fab" id="uploadFab"><i class="fa-solid fa-plus"></i></button>

<!-- Upload modal (clean – no type dropdown, no tips) -->
<div class="upload-modal" id="uploadModal">
    <div class="upload-sheet">
        <h3><i class="fa-solid fa-cloud-arrow-up"></i> Add to Gallery</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="titleInput" placeholder="What's this memory?">
        </div>
        <div class="form-group">
            <label>Choose from your phone</label>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <label class="file-picker" style="border-color: rgba(93,184,212,0.4);">
                    <i class="fa-solid fa-image" style="color:#5db8d4;"></i>
                    <span>📷 Photos (quick pick)</span>
                    <input type="file" id="photoInput" 
                           accept=".jpg,.jpeg,.png,.webp,.gif,.heic,.heif,image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif" 
                           multiple>
                </label>
                <label class="file-picker" style="border-color: rgba(224,168,59,0.4);">
                    <i class="fa-solid fa-video" style="color:#e0a83b;"></i>
                    <span>🎬 Videos (quick pick)</span>
                    <input type="file" id="videoInput" 
                           accept=".mp4,.mov,.webm,.mkv,.3gp,video/mp4,video/quicktime,video/webm,video/x-matroska,video/3gpp" 
                           multiple>
                </label>
                <label class="file-picker" style="border-color: rgba(60,184,120,0.6); border-width:2px;">
                    <i class="fa-solid fa-folder-open" style="color:#3cb878;"></i>
                    <span>📁 Browse Files (if Google Photos keeps opening)</span>
                    <input type="file" id="allFilesInput" 
                           accept="*/*" 
                           multiple>
                </label>
            </div>
            <div id="fileCount" style="font-size:0.7rem; color:var(--text-muted); margin-top:4px;"></div>
        </div>
        <div class="upload-actions">
            <button class="btn-cancel-upload" onclick="closeUpload()">Cancel</button>
            <button class="btn-submit-upload" id="uploadBtn" onclick="uploadMedia()">
                <i class="fa-solid fa-upload"></i> Upload
            </button>
        </div>
    </div>
</div>

<!-- Selection toolbar -->
<div class="selection-toolbar" id="selectionToolbar">
    <span class="count" id="selectionCount">0 selected</span>
    <div class="actions">
        <button onclick="sendSelectedToMemory()" class="memory-selected"><i class="fa-solid fa-bookmark"></i> Memory</button>
        <button onclick="shareSelected()" class="share-selected"><i class="fa-solid fa-share-nodes"></i> Share</button>
        <button onclick="deleteSelected()" class="delete-selected"><i class="fa-solid fa-trash"></i> Delete</button>
    </div>
</div>

<!-- Fullscreen viewer -->
<div class="viewer-overlay" id="viewerOverlay" onclick="closeViewer()">
    <div class="viewer-content" onclick="event.stopPropagation()">
        <button class="viewer-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
        <button class="viewer-nav prev" onclick="event.stopPropagation(); navigateViewer(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="viewer-nav next" onclick="event.stopPropagation(); navigateViewer(1)"><i class="fa-solid fa-chevron-right"></i></button>
        <div id="viewerMedia"></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="long-press-hint" id="longPressHint">Hold to select multiple</div>

<script>
    // const API = "http://localhost:8080/api/gallery";
    const API = "https://our-space-htoh.onrender.com/api/gallery";
    const MEMORY_API = "https://our-space-htoh.onrender.com/api/memories";
    
    let allMedia = [];
    let currentFilter = "all";
    let selectedIds = new Set();
    let isSelectMode = false;
    let longPressTimer = null;
    let viewerIndex = 0;
    let selectedFiles = [];

    const photoInput = document.getElementById('photoInput');
    const videoInput = document.getElementById('videoInput');
    const allFilesInput = document.getElementById('allFilesInput');
    const fileCount = document.getElementById('fileCount');

    function updateFileCount() {
        const total = selectedFiles.length;
        if (total > 0) {
            const photos = selectedFiles.filter(f => f.type.startsWith('image/')).length;
            const videos = selectedFiles.filter(f => f.type.startsWith('video/')).length;
            fileCount.textContent = `${total} file${total > 1 ? 's' : ''} selected (${photos} photo${photos !== 1 ? 's' : ''}, ${videos} video${videos !== 1 ? 's' : ''})`;
        } else {
            fileCount.textContent = '';
        }
    }

    function handleFiles(input, event) {
        const files = Array.from(event.target.files || []);
        files.forEach(file => {
            if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                selectedFiles.push(file);
            }
        });
        updateFileCount();
        input.value = '';
    }

    photoInput.addEventListener('change', (e) => handleFiles(photoInput, e));
    videoInput.addEventListener('change', (e) => handleFiles(videoInput, e));
    allFilesInput.addEventListener('change', (e) => handleFiles(allFilesInput, e));

    function resetFileInputs() {
        selectedFiles = [];
        photoInput.value = '';
        videoInput.value = '';
        allFilesInput.value = '';
        fileCount.textContent = '';
    }

    function showToast(message, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    // ⚡ Faster compression – max 1200px, quality 60%
    function compressImage(file, maxWidth = 1200, maxHeight = 1200, quality = 0.6) {
        return new Promise((resolve) => {
            if (!file.type.startsWith('image/')) {
                return resolve(file);
            }
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width <= maxWidth && height <= maxHeight) {
                    return resolve(file);
                }
                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    if (blob) {
                        const compressedFile = new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        resolve(compressedFile);
                    } else {
                        resolve(file);
                    }
                }, 'image/jpeg', quality);
            };
            img.onerror = () => resolve(file);
            img.src = URL.createObjectURL(file);
        });
    }

    document.getElementById("uploadFab").addEventListener("click", () => {
        document.getElementById("uploadModal").classList.add("active");
    });

    function closeUpload() {
        document.getElementById("uploadModal").classList.remove("active");
        document.getElementById("titleInput").value = "";
        resetFileInputs();
    }

    async function uploadMedia() {
        const title = document.getElementById("titleInput").value.trim() || "Untitled";
        
        if (selectedFiles.length === 0) {
            alert("Please select at least one file.");
            return;
        }

        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Compressing...';

        // Compress images before upload
        const compressedFiles = [];
        for (let file of selectedFiles) {
            if (file.type.startsWith('image/')) {
                const compressed = await compressImage(file);
                compressedFiles.push(compressed);
            } else {
                compressedFiles.push(file);
            }
        }

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

        const formData = new FormData();
        formData.append("title", title);
        // No type field – server auto‑detects from file
        for (let f of compressedFiles) {
            formData.append("files", f);
        }

        try {
            const res = await fetch(API, {
                method: "POST",
                body: formData
            });
            if (!res.ok) throw new Error("Upload failed");
            closeUpload();
            clearSelection();
            await loadMedia();
            showToast(`✅ ${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} uploaded!`);
            resetFileInputs();
        } catch (e) {
            alert("Upload failed. Please try again.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-upload"></i> Upload';
        }
    }

    async function loadMedia() {
        try {
            let url = API;
            if (currentFilter === "IMAGE" || currentFilter === "VIDEO") {
                url = `${API}/type/${currentFilter}`;
            } else if (currentFilter === "favorites") {
                url = `${API}/favorites`;
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error("Failed");
            allMedia = await res.json();
            renderGrid();
        } catch (e) {
            document.getElementById("mediaGrid").innerHTML = `
                <div class="empty-state">
                    <div class="icon"><i class="fa-solid fa-camera-retro"></i></div>
                    <h3>No memories yet</h3>
                    <p>Tap the + button to add photos & videos.</p>
                </div>
            `;
            document.getElementById("mediaCount").textContent = "0 items";
        }
    }

    function renderGrid() {
        const grid = document.getElementById("mediaGrid");
        document.getElementById("mediaCount").textContent = `${allMedia.length} item${allMedia.length !== 1 ? 's' : ''}`;

        if (!allMedia.length) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon"><i class="fa-solid fa-camera-retro"></i></div>
                    <h3>No memories yet</h3>
                    <p>Tap the + button to add photos & videos.</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = allMedia.map((item, index) => {
            const isVideo = item.type === "VIDEO";
            const isSelected = selectedIds.has(item.id);
            const isFavorite = item.favorite || false;

            return `
                <div class="media-item ${isSelected ? 'selected' : ''}" 
                     data-id="${item.id}" 
                     data-index="${index}"
                     ontouchstart="handleTouchStart(event, ${item.id})"
                     ontouchend="handleTouchEnd(event)"
                     onmousedown="handleMouseDown(event, ${item.id})"
                     onmouseup="handleMouseUp(event)"
                     onmouseleave="handleMouseLeave()"
                     onclick="handleClick(event, ${item.id})">
                    ${isVideo ? 
                        `<video src="${item.fileUrl}" muted preload="metadata" playsinline></video>` : 
                        `<img src="${item.fileUrl}" alt="${escapeHTML(item.title)}" loading="lazy" decoding="async">`
                    }
                    <div class="badge">
                        <i class="fa-solid ${isVideo ? 'fa-video' : 'fa-image'}"></i>
                        ${isVideo ? 'Video' : 'Photo'}
                    </div>
                    <div class="favorite-indicator ${isFavorite ? 'show' : ''}">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <div class="selection-check">✓</div>
                    <div class="overlay ${isSelected ? 'show' : ''}" id="overlay-${item.id}">
                        <div class="actions">
                            <button class="fav-btn ${isFavorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${item.id})">
                                <i class="fa-${isFavorite ? 'solid' : 'regular'} fa-heart"></i>
                            </button>
                            <button class="memory-btn" onclick="event.stopPropagation(); sendToMemory(${item.id})">
                                <i class="fa-solid fa-bookmark"></i>
                            </button>
                            <button class="share-btn" onclick="event.stopPropagation(); shareItem(${item.id})">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteItem(${item.id})">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    // ⭐ Longer long‑press (800ms) to avoid accidental triggers
    let isLongPress = false;
    let currentPressId = null;

    function handleTouchStart(e, id) {
        isLongPress = false;
        currentPressId = id;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
            isLongPress = true;
            enterSelectMode(id);
        }, 800);
    }

    function handleTouchEnd(e) { clearTimeout(longPressTimer); }

    function handleMouseDown(e, id) {
        isLongPress = false;
        currentPressId = id;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
            isLongPress = true;
            enterSelectMode(id);
        }, 800);
    }

    function handleMouseUp(e) { clearTimeout(longPressTimer); }
    function handleMouseLeave() { clearTimeout(longPressTimer); isLongPress = false; }

    function handleClick(e, id) {
        if (isLongPress) { isLongPress = false; return; }
        if (isSelectMode) { toggleSelect(id); } else { openViewer(id); }
    }

    function enterSelectMode(id) {
        isSelectMode = true;
        toggleSelect(id);
        document.getElementById("selectionToolbar").classList.add("active");
        document.getElementById("longPressHint").style.display = "block";
        setTimeout(() => { document.getElementById("longPressHint").style.display = "none"; }, 2000);
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) { selectedIds.delete(id); } else { selectedIds.add(id); }
        updateSelectionUI();
    }

    function updateSelectionUI() {
        const count = selectedIds.size;
        document.getElementById("selectionCount").textContent = `${count} selected`;
        if (count === 0) {
            isSelectMode = false;
            document.getElementById("selectionToolbar").classList.remove("active");
        }
        document.querySelectorAll(".media-item").forEach(el => {
            const id = parseInt(el.dataset.id);
            const isSel = selectedIds.has(id);
            el.classList.toggle("selected", isSel);
            // Also toggle overlay visibility
            const overlay = el.querySelector(".overlay");
            if (overlay) {
                overlay.classList.toggle("show", isSel);
            }
        });
    }

    function clearSelection() {
        selectedIds.clear();
        isSelectMode = false;
        document.getElementById("selectionToolbar").classList.remove("active");
        document.querySelectorAll(".media-item").forEach(el => {
            el.classList.remove("selected");
            const overlay = el.querySelector(".overlay");
            if (overlay) overlay.classList.remove("show");
        });
    }

    async function sendToMemory(id) {
        const item = allMedia.find(m => m.id === id);
        if (!item) return;
        try {
            const memoryData = {
                title: item.title || "From Gallery",
                description: "📸 Shared from gallery",
                category: "PHOTO",
                uploadedBy: "Shared",
                imageUrls: [item.fileUrl],
                dateCreated: new Date().toISOString().split('T')[0]
            };
            const res = await fetch(MEMORY_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(memoryData)
            });
            if (!res.ok) throw new Error("Failed to save to memory");
            showToast("✅ Added to Memories! ❤️");
        } catch (e) {
            alert("Failed to add to memories.");
        }
    }

    async function sendSelectedToMemory() {
        if (selectedIds.size === 0) return;
        const items = allMedia.filter(m => selectedIds.has(m.id));
        let successCount = 0;
        for (let item of items) {
            try {
                const memoryData = {
                    title: item.title || "From Gallery",
                    description: "📸 Shared from gallery",
                    category: "PHOTO",
                    uploadedBy: "Shared",
                    imageUrls: [item.fileUrl],
                    dateCreated: new Date().toISOString().split('T')[0]
                };
                const res = await fetch(MEMORY_API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(memoryData)
                });
                if (res.ok) successCount++;
            } catch (e) {}
        }
        if (successCount > 0) {
            showToast(`✅ ${successCount} item${successCount > 1 ? 's' : ''} added to Memories! ❤️`);
            clearSelection();
        } else {
            alert("Failed to add items to memories.");
        }
    }

    async function deleteItem(id) {
        if (!confirm("Delete this item?")) return;
        try {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            selectedIds.delete(id);
            await loadMedia();
            if (selectedIds.size === 0) {
                document.getElementById("selectionToolbar").classList.remove("active");
            }
        } catch (e) { alert("Delete failed."); }
    }

    async function deleteSelected() {
        if (selectedIds.size === 0) return;
        if (!confirm(`Delete ${selectedIds.size} selected item${selectedIds.size > 1 ? 's' : ''}?`)) return;
        const ids = Array.from(selectedIds);
        for (let id of ids) {
            try { await fetch(`${API}/${id}`, { method: "DELETE" }); } catch (e) {}
        }
        selectedIds.clear();
        await loadMedia();
        document.getElementById("selectionToolbar").classList.remove("active");
        isSelectMode = false;
    }

    async function toggleFavorite(id) {
        try {
            await fetch(`${API}/${id}/favorite`, { method: "PUT" });
            await loadMedia();
        } catch (e) { alert("Failed to update favorite."); }
    }

    function shareItem(id) {
        const item = allMedia.find(m => m.id === id);
        if (!item) return;
        if (navigator.share) {
            navigator.share({ title: item.title || "Our Space memory", url: item.fileUrl }).catch(() => {});
        } else {
            navigator.clipboard.writeText(item.fileUrl).then(() => {
                showToast("📋 Link copied to clipboard!");
            }).catch(() => { prompt("Copy this URL:", item.fileUrl); });
        }
    }

    async function shareSelected() {
        if (selectedIds.size === 0) return;
        const items = allMedia.filter(m => selectedIds.has(m.id));
        const urls = items.map(m => m.fileUrl).join("\n");
        if (navigator.share) {
            try {
                await navigator.share({
                    title: "Our Space memories",
                    text: `Check out these ${items.length} memories from Our Space!`,
                    url: items[0]?.fileUrl || ""
                });
            } catch (e) {}
        } else {
            navigator.clipboard.writeText(urls).then(() => {
                showToast(`📋 ${items.length} links copied to clipboard!`);
            }).catch(() => { prompt("Copy these URLs:", urls); });
        }
    }

    function openViewer(id) {
        const idx = allMedia.findIndex(m => m.id === id);
        if (idx === -1) return;
        viewerIndex = idx;
        showViewer();
    }

    function showViewer() {
        const item = allMedia[viewerIndex];
        if (!item) return;
        const container = document.getElementById("viewerMedia");
        if (item.type === "VIDEO") {
            container.innerHTML = `<video src="${item.fileUrl}" controls autoplay></video>`;
        } else {
            container.innerHTML = `<img src="${item.fileUrl}" alt="${escapeHTML(item.title)}" decoding="async">`;
        }
        document.getElementById("viewerOverlay").classList.add("active");
    }

    function closeViewer() {
        document.getElementById("viewerOverlay").classList.remove("active");
        document.getElementById("viewerMedia").innerHTML = "";
    }

    function navigateViewer(direction) {
        if (allMedia.length === 0) return;
        viewerIndex = (viewerIndex + direction + allMedia.length) % allMedia.length;
        showViewer();
    }

    document.querySelectorAll("#filterTabs .tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#filterTabs .tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            clearSelection();
            loadMedia();
        });
    });

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            if (document.getElementById("viewerOverlay").classList.contains("active")) {
                closeViewer();
            } else if (document.getElementById("uploadModal").classList.contains("active")) {
                closeUpload();
            } else if (selectedIds.size > 0) {
                clearSelection();
            }
        }
        if (e.key === "ArrowLeft" && document.getElementById("viewerOverlay").classList.contains("active")) {
            e.preventDefault(); navigateViewer(-1);
        }
        if (e.key === "ArrowRight" && document.getElementById("viewerOverlay").classList.contains("active")) {
            e.preventDefault(); navigateViewer(1);
        }
    });

    function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = str || "";
        return div.innerHTML;
    }

    loadMedia();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Special Days · Timeline</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg-deep: #060609;
      --bg-primary: #0a0a10;
      --bg-card: #111118;
      --bg-input: #181820;
      --bg-hover: #1e1e2a;
      --mustard: #e0a83b;
      --mustard-glow: rgba(224, 168, 59, 0.4);
      --mustard-soft: rgba(224, 168, 59, 0.08);
      --mustard-gradient: linear-gradient(135deg, #e0a83b, #c48f28);
      --rose: #e0887c;
      --rose-glow: rgba(224, 136, 124, 0.35);
      --sky: #5db8d4;
      --sky-glow: rgba(93, 184, 212, 0.35);
      --text-primary: #edeef2;
      --text-secondary: #b0b3bd;
      --text-muted: #6f727d;
      --border-subtle: #1f1f2b;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.7);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.5);
      --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#2a2a38; border-radius:10px; }

    /* ── HEADER WITH COUNTDOWN ── */
    .header {
      background: var(--bg-primary);
      border-bottom:1px solid var(--border-subtle);
      padding: 16px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter:blur(8px);
    }
    .header-left {
      display:flex;
      align-items:center;
      gap:12px;
    }
    .header-icon {
      width:38px; height:38px;
      border-radius:50%;
      background:var(--mustard-gradient);
      display:flex; align-items:center; justify-content:center;
      color:#000; font-size:1rem;
      box-shadow:0 4px 16px var(--mustard-glow);
    }
    .header h1 {
      font-size:1.2rem; font-weight:700; letter-spacing:-0.02em;
    }
    .next-event {
      display:flex; align-items:center; gap:10px;
      background:var(--bg-card);
      border:1px solid var(--border-subtle);
      border-radius:40px;
      padding:8px 18px;
      font-size:0.8rem;
      color:var(--text-secondary);
    }
    .next-event .label { color:var(--text-muted); font-weight:500; }
    .next-event .countdown {
      font-weight:700; color:var(--mustard);
      background:rgba(224,168,59,0.1);
      padding:2px 10px; border-radius:20px;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width:1000px;
      margin:0 auto;
      padding:30px 20px 50px;
    }

    /* ── ADD BUTTON & FORM ── */
    .add-bar {
      display:flex;
      justify-content:center;
      margin-bottom:30px;
    }
    .btn-add-floating {
      background:var(--mustard-gradient);
      border:none;
      color:#1a1000;
      font-weight:700;
      padding:12px 28px;
      border-radius:40px;
      cursor:pointer;
      font-size:0.9rem;
      display:flex; align-items:center; gap:8px;
      box-shadow:0 8px 24px var(--mustard-glow);
      transition:all var(--transition-smooth);
      font-family:var(--font);
    }
    .btn-add-floating:hover {
      transform:translateY(-2px);
      box-shadow:0 14px 32px rgba(224,168,59,0.55);
      filter:brightness(1.08);
    }

    .form-panel {
      background:var(--bg-card);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:24px;
      margin-bottom:24px;
      display:none;
      box-shadow:var(--shadow-md);
      transition:all 0.3s ease;
    }
    .form-panel.visible { display:block; }
    .form-title {
      font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em;
      color:var(--text-muted); font-weight:600; margin-bottom:18px;
    }
    .form-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label {
      font-size:0.7rem; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.04em;
    }
    input, select {
      font-family:var(--font); font-size:0.85rem;
      padding:10px 14px;
      border:1.5px solid var(--border-subtle);
      border-radius:8px;
      background:var(--bg-input);
      color:var(--text-primary);
      outline:none;
      transition:all 0.2s;
    }
    input:focus, select:focus {
      border-color:var(--mustard);
      box-shadow:0 0 0 3px rgba(224,168,59,0.08);
    }
    .form-actions {
      grid-column:span 2;
      display:flex; gap:10px; justify-content:flex-end; margin-top:8px;
    }
    .btn-cancel {
      background:none; border:1px solid var(--border-subtle);
      color:var(--text-secondary); padding:10px 20px; border-radius:8px;
      cursor:pointer; font-family:var(--font); font-weight:500;
    }
    .btn-save {
      background:var(--mustard-gradient);
      border:none; color:#1a1000; font-weight:700;
      padding:10px 24px; border-radius:8px; cursor:pointer;
      font-family:var(--font);
      box-shadow:0 4px 12px var(--mustard-glow);
    }

    /* ── TIMELINE ── */
    .timeline {
      position:relative;
      padding:0 0 0 50px;
    }
    .timeline::before {
      content:'';
      position:absolute;
      left:24px; top:8px; bottom:8px;
      width:3px;
      background:linear-gradient(to bottom, var(--mustard), var(--rose), var(--sky), var(--mustard));
      border-radius:3px;
      opacity:0.6;
    }
    .timeline-empty {
      text-align:center; padding:60px 20px; color:var(--text-muted);
    }
    .timeline-empty .icon {
      font-size:2.5rem; margin-bottom:12px; opacity:0.7;
    }

    /* ── EVENT CARD ── */
    .event {
      position:relative;
      margin-bottom:28px;
      display:flex;
      gap:16px;
      align-items:flex-start;
      transition:all var(--transition-smooth);
    }
    .event-marker {
      position:absolute;
      left:-40px; top:12px;
      width:28px; height:28px;
      border-radius:50%;
      background:var(--bg-card);
      border:3px solid var(--mustard);
      display:flex; align-items:center; justify-content:center;
      z-index:2;
      box-shadow:0 0 18px var(--mustard-glow);
      transition:all 0.2s;
    }
    .event:hover .event-marker {
      transform:scale(1.2);
      box-shadow:0 0 28px var(--mustard-glow);
    }
    .event-card {
      background:var(--bg-card);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:18px 20px;
      flex:1;
      box-shadow:var(--shadow-md);
      transition:all var(--transition-smooth);
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:12px;
    }
    .event:hover .event-card {
      border-color:#2e2e3c;
      transform:translateX(4px);
      box-shadow:0 12px 28px rgba(0,0,0,0.6);
    }
    .event-date-badge {
      background:rgba(224,168,59,0.1);
      border:1px solid rgba(224,168,59,0.3);
      border-radius:30px;
      padding:6px 14px;
      font-size:0.75rem;
      font-weight:600;
      color:var(--mustard);
      display:flex; align-items:center; gap:6px;
      white-space:nowrap;
    }
    .event-details {
      flex:1;
      min-width:200px;
    }
    .event-title {
      font-family:var(--font-display);
      font-size:1.2rem;
      font-weight:600;
      color:var(--text-primary);
      margin-bottom:4px;
      letter-spacing:-0.01em;
    }
    .event-type {
      font-size:0.7rem;
      text-transform:uppercase;
      letter-spacing:0.05em;
      color:var(--text-muted);
      display:flex; align-items:center; gap:4px;
    }
    .event-type i { font-size:0.6rem; }
    .event-countdown {
      margin-left:auto;
      text-align:right;
    }
    .days-left {
      font-size:0.8rem;
      font-weight:700;
      color:var(--mustard);
      background:rgba(224,168,59,0.08);
      padding:4px 12px;
      border-radius:20px;
      white-space:nowrap;
    }
    .past-label {
      font-size:0.75rem;
      color:var(--text-muted);
      font-style:italic;
    }
    .event-actions {
      display:flex; gap:8px;
    }
    .btn-delete {
      background:none; border:none;
      color:var(--text-muted); cursor:pointer;
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    .btn-delete:hover {
      color:#ff5e5e;
      background:rgba(255,80,80,0.1);
    }

    @media (max-width:700px) {
      .timeline { padding-left:40px; }
      .event { flex-direction:column; }
      .event-card { flex-direction:column; align-items:flex-start; }
      .event-countdown { margin-left:0; text-align:left; }
      .form-grid { grid-template-columns:1fr; }
      .form-actions { grid-column:span 1; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon"><i class="fa-solid fa-heart-circle-check"></i></div>
      <h1>Our Special Days</h1>
    </div>
    <div class="next-event" id="nextEventDisplay">
      <span class="label">Next up</span>
      <span class="countdown">–</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <!-- ADD BUTTON -->
    <div class="add-bar">
      <button class="btn-add-floating" id="btnAddToggle">
        <i class="fa-solid fa-plus"></i> Add a memory
      </button>
    </div>

    <!-- FORM PANEL -->
    <div class="form-panel" id="formPanel">
      <div class="form-title">✨ Save a special day</div>
      <div class="form-grid">
        <div class="form-group">
          <label>What's this day?</label>
          <input type="text" id="descInput" placeholder="e.g. First kiss, Birthday…">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="dateInput">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="typeSelect">
            <option value="milestone">💫 Milestone</option>
            <option value="birthday">🎂 Birthday</option>
            <option value="anniversary">💍 Anniversary</option>
            <option value="first">🌸 First time</option>
            <option value="other">❤️ Other</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" id="btnCancel">Cancel</button>
          <button class="btn-save" id="btnSave">Save Day</button>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline" id="timelineContainer">
      <!-- Dynamic content -->
    </div>
  </div>

  <script>
    (function() {
      const API = "http://localhost:8080/api/special-days";
      let daysData = [];

      // Elements
      const timelineContainer = document.getElementById('timelineContainer');
      const nextEventDisplay = document.getElementById('nextEventDisplay');
      const formPanel = document.getElementById('formPanel');
      const btnAddToggle = document.getElementById('btnAddToggle');
      const btnCancel = document.getElementById('btnCancel');
      const btnSave = document.getElementById('btnSave');
      const descInput = document.getElementById('descInput');
      const dateInput = document.getElementById('dateInput');
      const typeSelect = document.getElementById('typeSelect');

      // Toggle form
      btnAddToggle.addEventListener('click', () => {
        formPanel.classList.toggle('visible');
        btnAddToggle.style.display = formPanel.classList.contains('visible') ? 'none' : 'flex';
      });
      btnCancel.addEventListener('click', closeForm);
      function closeForm() {
        formPanel.classList.remove('visible');
        btnAddToggle.style.display = 'flex';
        descInput.value = '';
        dateInput.value = '';
      }

      // Load days
      async function loadDays() {
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error('Failed');
          daysData = await res.json();
        } catch (e) {
          console.warn('Could not load special days, using empty list.', e);
          daysData = [];
        }
        renderTimeline();
        updateNextEvent();
      }

      // Render timeline
      function renderTimeline() {
        if (!daysData.length) {
          timelineContainer.innerHTML = `
            <div class="timeline-empty">
              <div class="icon">📅</div>
              <h3>No special days yet</h3>
              <p>Add your first memory — a first date, an anniversary, anything you want to keep close.</p>
            </div>`;
          return;
        }

        // Sort by date ascending (future dates first maybe? we'll sort by date ascending to show chronology)
        const sorted = [...daysData].sort((a,b) => new Date(a.eventDate) - new Date(b.eventDate));

        timelineContainer.innerHTML = sorted.map(day => {
          const dateObj = new Date(day.eventDate);
          const formattedDate = dateObj.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
          const today = new Date(); today.setHours(0,0,0,0);
          const eventDateOnly = new Date(dateObj); eventDateOnly.setHours(0,0,0,0);
          const diffTime = eventDateOnly - today;
          const diffDays = Math.ceil(diffTime / (1000*60*60*24));
          let countdownHtml = '';
          if (diffDays === 0) {
            countdownHtml = '<span class="days-left">🎉 Today!</span>';
          } else if (diffDays > 0) {
            countdownHtml = `<span class="days-left">in ${diffDays} day${diffDays!==1?'s':''}</span>`;
          } else {
            const absDays = Math.abs(diffDays);
            countdownHtml = `<span class="past-label">${absDays} day${absDays!==1?'s':''} ago</span>`;
          }
          
          const typeName = day.type || 'special';
          // icon mapping
          const iconMap = {
            milestone: 'fa-gem',
            birthday: 'fa-cake-candles',
            anniversary: 'fa-heart',
            first: 'fa-star',
            other: 'fa-heart-circle-plus'
          };
          const iconClass = iconMap[typeName.toLowerCase()] || 'fa-heart';

          return `
            <div class="event">
              <div class="event-marker"><i class="fa-solid fa-heart" style="font-size:0.7rem; color:var(--mustard);"></i></div>
              <div class="event-card">
                <div class="event-date-badge">
                  <i class="fa-regular fa-calendar"></i> ${formattedDate}
                </div>
                <div class="event-details">
                  <div class="event-title">${escapeHTML(day.description || 'Special Day')}</div>
                  <div class="event-type"><i class="fa-solid ${iconClass}"></i> ${escapeHTML(typeName)}</div>
                </div>
                <div class="event-countdown">${countdownHtml}</div>
                <div class="event-actions">
                  <button class="btn-delete" data-id="${day.id}" title="Remove"><i class="fa-solid fa-trash"></i></button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Attach delete events
        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            deleteDay(id);
          });
        });
      }

      function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Update next event
      function updateNextEvent() {
        const today = new Date(); today.setHours(0,0,0,0);
        const futureDays = daysData
          .map(d => ({...d, dateObj: new Date(d.eventDate)}))
          .filter(d => d.dateObj >= today)
          .sort((a,b) => a.dateObj - b.dateObj);
        const countdownSpan = nextEventDisplay.querySelector('.countdown');
        if (futureDays.length === 0) {
          countdownSpan.textContent = 'none';
          return;
        }
        const next = futureDays[0];
        const diffDays = Math.ceil((next.dateObj - today) / (1000*60*60*24));
        if (diffDays === 0) {
          countdownSpan.textContent = '🎉 Today!';
        } else {
          countdownSpan.textContent = `${diffDays} day${diffDays!==1?'s':''}`;
        }
      }

      // Add day
      btnSave.addEventListener('click', async () => {
        const description = descInput.value.trim();
        const eventDate = dateInput.value;
        const type = typeSelect.value;
        if (!description || !eventDate) {
          alert('Please fill in description and date.');
          return;
        }
        try {
          await fetch(API, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ description, eventDate, type })
          });
          closeForm();
          await loadDays();
        } catch (e) {
          alert('Failed to add day.');
        }
      });

      async function deleteDay(id) {
        if (!confirm('Remove this day from your timeline?')) return;
        try {
          await fetch(`${API}/${id}`, { method:'DELETE' });
          await loadDays();
        } catch (e) {
          alert('Could not delete.');
        }
      }

      // Init
      loadDays();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Player</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root {
        --bg-primary: #0a0a0c;
        --bg-secondary: #0f0f13;
        --bg-tertiary: #16161c;
        --bg-card: #1b1b22;
        --bg-hover: #22222b;
        --bg-input: #1e1e26;
        --accent: #1ed760;
        --accent-glow: rgba(30, 215, 96, 0.35);
        --accent-gradient: linear-gradient(135deg, #1ed760 0%, #17b34a 50%, #0fa03e 100%);
        --text-primary: #f0f0f3;
        --text-secondary: #a9a9b3;
        --text-muted: #6c6c78;
        --border-subtle: #262630;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.6);
        --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.5);
        --shadow-sm: 0 4px 8px rgba(0, 0, 0, 0.4);
        --transition-fast: 0.15s ease;
        --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-bounce: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-family);
        height: 100vh;
        height: -webkit-fill-available;
        overflow: hidden;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
        display: flex;
        flex-direction: column;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e3a; border-radius: 10px; }

    /* ── APP CONTAINER ── */
    .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;        /* keep */
        min-height: 0;           /* ★ FIX: allow flex children to shrink */
    }

    /* ── LIBRARY SCREEN ── */
    .library-screen {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;           /* ★ FIX: allow the song list to shrink */
        overflow: hidden;
        background: var(--bg-primary);
        padding: 16px 16px 0;
        padding-bottom: calc(80px + var(--safe-bottom));
    }

    .library-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        flex-shrink: 0;
    }
    .library-header h2 {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -0.02em;
    }
    .add-fab {
        width: 40px; height: 40px; border-radius: 50%;
        background: var(--accent-gradient);
        border: none; color: #000; font-size: 1.3rem;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; box-shadow: 0 4px 14px var(--accent-glow);
        transition: transform var(--transition-bounce);
    }
    .add-fab:active { transform: scale(0.92); }

    .search-box {
        background: var(--bg-input);
        border-radius: var(--radius-md);
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        flex-shrink: 0;
        border: 1px solid var(--border-subtle);
    }
    .search-box input {
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 0.95rem;
        width: 100%;
        outline: none;
        font-family: var(--font-family);
    }
    .search-box i { color: var(--text-muted); }

    /* ── SONG LIST ── */
    .song-list {
        
        overflow-y: auto;        /* ★ enables scrolling */
        height: 450px;
        
    }
    .song-list:empty::after {
        content: 'No songs yet — tap + to add one';
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
        padding: 40px 10px;
        opacity: 0.7;
        font-style: italic;
    }

    .song-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg-card);
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        transition: background var(--transition-fast), transform var(--transition-fast);
        border: 1px solid transparent;
        cursor: pointer;
        flex-shrink: 0;
    }
    .song-item:active { background: var(--bg-hover); transform: scale(0.99); }
    .song-thumb {
        width: 42px; height: 42px; border-radius: 6px;
        background: var(--bg-tertiary);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-muted); font-size: 1.1rem; flex-shrink: 0;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
        font-weight: 600; font-size: 0.9rem; color: var(--text-primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist {
        font-size: 0.75rem; color: var(--text-secondary);
        margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .delete-btn {
        background: none; border: none; color: var(--text-muted);
        font-size: 1rem; padding: 8px; cursor: pointer; border-radius: 6px;
        transition: color var(--transition-fast), background var(--transition-fast);
    }
    .delete-btn:active { color: #ff5e5e; background: rgba(255, 80, 80, 0.1); }

    /* ── ADD FORM ── */
    .form-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5);
        z-index: 50; display: none; align-items: flex-end;
    }
    .form-overlay.active { display: flex; }
    .form-sheet {
        background: var(--bg-secondary);
        width: 100%; max-height: 80vh; border-radius: 20px 20px 0 0;
        padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        transform: translateY(100%); transition: transform 0.3s ease;
    }
    .form-overlay.active .form-sheet { transform: translateY(0); }
    .form-sheet h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .form-sheet input,
    .form-sheet textarea {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 12px;
        color: var(--text-primary);
        font-size: 0.95rem;
        font-family: var(--font-family);
        outline: none;
    }
    .form-sheet input:focus,
    .form-sheet textarea:focus { border-color: var(--accent); }
    .form-sheet textarea { min-height: 80px; resize: vertical; }
    .form-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        padding: 12px; border-radius: var(--radius-sm);
        flex: 1; font-weight: 600; text-align: center; cursor: pointer;
    }
    .btn-save {
        background: var(--accent-gradient);
        border: none; color: #000;
        padding: 12px; border-radius: var(--radius-sm);
        flex: 1; font-weight: 700; cursor: pointer;
    }

    /* ── MINI PLAYER ── */
    .mini-player {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--bg-tertiary); backdrop-filter: blur(10px);
        border-top: 1px solid var(--border-subtle);
        padding: 10px 16px; padding-bottom: calc(10px + var(--safe-bottom));
        display: flex; align-items: center; gap: 12px;
        z-index: 30; box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
        cursor: pointer; touch-action: manipulation;
    }
    .mini-player:active { background: var(--bg-hover); }
    .mini-art {
        width: 44px; height: 44px; border-radius: 6px;
        background: var(--accent-gradient);
        display: flex; align-items: center; justify-content: center;
        color: #000; font-size: 1.2rem; flex-shrink: 0;
    }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title {
        font-weight: 600; font-size: 0.9rem; color: var(--text-primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mini-artist { font-size: 0.75rem; color: var(--text-secondary); }
    .mini-controls { display: flex; align-items: center; gap: 4px; }
    .mini-controls button {
        background: none; border: none; color: var(--text-primary);
        font-size: 1.2rem; padding: 8px; cursor: pointer;
        transition: transform var(--transition-fast);
    }
    .mini-controls button:active { transform: scale(0.85); }
    .mini-controls .btn-shuffle { font-size: 1rem; color: var(--text-muted); }
    .mini-controls .btn-shuffle.active { color: var(--accent); }

    /* ── NOW PLAYING SCREEN ── */
    .player-screen {
        position: fixed; inset: 0; background: var(--bg-primary);
        z-index: 40; display: flex; flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        padding-top: env(safe-area-inset-top);
    }
    .player-screen.active { transform: translateY(0); }
    .player-top {
        display: flex; align-items: center; padding: 16px; gap: 12px; flex-shrink: 0;
    }
    .back-btn {
        background: none; border: none; color: var(--text-primary);
        font-size: 1.5rem; padding: 8px; cursor: pointer;
    }
    .now-playing-area {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 16px; gap: 16px;
    }
    .video-wrapper {
        width: 100%; max-width: 400px; aspect-ratio: 16 / 9;
        border-radius: var(--radius-lg); overflow: hidden; background: #000;
        box-shadow: var(--shadow-lg);
    }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; }
    .video-wrapper.empty {
        display: flex; align-items: center; justify-content: center;
        background: var(--bg-tertiary); border: 2px dashed #2e2e38;
    }
    .video-wrapper.empty::after { content: '🎬'; font-size: 3rem; opacity: 0.3; }
    .np-title {
        font-weight: 700; font-size: 1.3rem; text-align: center; color: var(--text-primary);
    }
    .np-artist { font-size: 0.9rem; color: var(--text-secondary); }
    .np-note {
        font-size: 0.85rem; color: var(--text-muted); font-style: italic; text-align: center;
        background: rgba(30,215,96,0.08); padding: 6px 14px; border-radius: 20px; display: none;
    }
    .np-note.visible { display: block; }
    .player-controls { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
    .player-controls button {
        background: none; border: none; color: var(--text-primary);
        font-size: 1.8rem; padding: 8px; cursor: pointer;
        transition: transform var(--transition-fast);
    }
    .player-controls button:active { transform: scale(0.88); }
    .play-btn-big {
        background: var(--accent-gradient); border: none; color: #000;
        width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px var(--accent-glow);
    }

    .fetch-status {
        font-size: 0.75rem; color: var(--accent); margin-top: -4px; display: none;
    }
    .fetch-status.visible { display: block; }

    @media (min-width: 500px) {
        .song-thumb { width: 48px; height: 48px; }
        .song-title { font-size: 1rem; }
        .song-artist { font-size: 0.8rem; }
        .mini-art { width: 48px; height: 48px; }
    }
</style>
</head>
<body>

<div class="app">
    <div class="library-screen">
        <div class="library-header">
            <h2>🎵 R&B Library</h2>
            <button class="add-fab" id="showAddForm"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search" type="text" placeholder="Search songs or artists..." oninput="renderList()" autocomplete="off">
        </div>
        <div class="song-list" id="songList"></div>
    </div>

    <div class="form-overlay" id="formOverlay">
        <div class="form-sheet">
            <h3>Add a song</h3>
            <input id="youtubeInput" type="text" placeholder="YouTube link (watch or youtu.be)" autocomplete="off">
            <div class="fetch-status" id="fetchStatus"></div>
            <input id="titleInput" type="text" placeholder="Song title (auto‑filled)" autocomplete="off">
            <input id="artistInput" type="text" placeholder="Artist name (auto‑filled)" autocomplete="off">
            <textarea id="noteInput" placeholder="Add a note..."></textarea>
            <div class="form-actions">
                <div class="btn-cancel" id="cancelForm">Cancel</div>
                <div class="btn-save" id="saveForm">Save</div>
            </div>
        </div>
    </div>

    <div class="mini-player" id="miniPlayer" onclick="openPlayerScreen()">
        <div class="mini-art"><i class="fa-solid fa-play"></i></div>
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">Nothing playing</div>
            <div class="mini-artist" id="miniArtist">Queue a song to begin</div>
        </div>
        <div class="mini-controls" onclick="event.stopPropagation();">
            <button class="btn-shuffle" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
            <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
            <button onclick="togglePlay()"><i class="fa-solid fa-play" id="miniPlayIcon"></i></button>
            <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

    <div class="player-screen" id="playerScreen">
        <div class="player-top">
            <button class="back-btn" onclick="closePlayerScreen()"><i class="fa-solid fa-chevron-down"></i></button>
            <span style="font-weight:600;">Now Playing</span>
        </div>
        <div class="now-playing-area">
            <div class="video-wrapper empty" id="videoContainer"></div>
            <div class="np-title" id="npTitle">Select a song</div>
            <div class="np-artist" id="npArtist"></div>
            <div class="np-note" id="npNote"></div>
            <div class="player-controls">
                <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-btn-big" onclick="togglePlay()"><i class="fa-solid fa-play" id="bigPlayIcon"></i></button>
                <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- YouTube IFrame API -->
<script>
    let ytPlayer = null;
    let isPlayerReady = false;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() { console.log('YT API ready'); }

    function createPlayer(videoId) {
        if (ytPlayer) ytPlayer.destroy();
        const container = document.getElementById('videoContainer');
        container.innerHTML = '';
        container.classList.remove('empty');

        ytPlayer = new YT.Player('videoContainer', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: {
                'autoplay': 1,
                'controls': 1,
                'rel': 0,
                'playsinline': 1,
                'modestbranding': 1,
                'origin': window.location.origin
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }
   
    function onPlayerReady(event) {
        isPlayerReady = true;
        event.target.playVideo();
        updatePlayIcons(true);
    }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
        updatePlayIcons(true);
        notifyParent(true);
    } else if (event.data === YT.PlayerState.PAUSED) {
        updatePlayIcons(false);
        notifyParent(false);
    } else if (event.data === YT.PlayerState.ENDED) {
        updatePlayIcons(false);
        notifyParent(false);
        nextSong();   // if you still want auto‑next
    }
}

function notifyParent(playing) {
    if (window.parent !== window) {
        const song = songs[currentIndex];
        if (song) {
            window.parent.postMessage({
                action: 'nowPlaying',
                title: song.title || 'Untitled',
                artist: song.artist || 'Unknown',
                playing: playing
            }, '*');
        }
    }
}
    function updatePlayIcons(playing) {
        const icon = playing ? 'fa-pause' : 'fa-play';
        document.getElementById('miniPlayIcon').className = `fa-solid ${icon}`;
        document.getElementById('bigPlayIcon').className = `fa-solid ${icon}`;
    }

    function togglePlay() {
        if (!ytPlayer || !isPlayerReady) {
            if (songs.length > 0 && currentIndex === -1) playSong(0);
            return;
        }
        const state = ytPlayer.getPlayerState();
        if (state === YT.PlayerState.PLAYING) {
            ytPlayer.pauseVideo();
        } else {
            ytPlayer.playVideo();
        }
    }
</script>

<script>
    const API = "http://localhost:8080/api/songs";
    let songs = [];
    let currentIndex = -1;
    let shuffleMode = false;
    let shuffleQueue = [];

    const songListEl = document.getElementById("songList");
    const miniTitle = document.getElementById("miniTitle");
    const miniArtist = document.getElementById("miniArtist");
    const npTitle = document.getElementById("npTitle");
    const npArtist = document.getElementById("npArtist");
    const npNote = document.getElementById("npNote");
    const videoContainer = document.getElementById("videoContainer");
    const playerScreen = document.getElementById("playerScreen");

    // ── Fetch YouTube info ──
    async function fetchYouTubeInfo(url) {
        const videoId = extractYouTubeID(url);
        if (!videoId) return null;
        try {
            const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
            if (!res.ok) throw new Error('Cannot fetch');
            const data = await res.json();
            return { title: data.title || '', artist: data.author_name || '' };
        } catch (e) { return null; }
    }

    document.getElementById("youtubeInput").addEventListener("input", async function() {
        const url = this.value.trim();
        const statusEl = document.getElementById("fetchStatus");
        if (!url) { statusEl.classList.remove("visible"); return; }
        statusEl.textContent = "Fetching song info…";
        statusEl.classList.add("visible");
        const info = await fetchYouTubeInfo(url);
        if (info) {
            document.getElementById("titleInput").value = info.title;
            document.getElementById("artistInput").value = info.artist;
            statusEl.textContent = "✅ Auto‑filled!";
            statusEl.style.color = "var(--accent)";
        } else {
            statusEl.textContent = "Could not fetch info — type manually";
            statusEl.style.color = "#ff5e5e";
        }
    });
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'playSong') {
        // e.data.song contains the song object (title, artist, youtubeLink, etc.)
        if (typeof songs !== 'undefined' && songs.length > 0) {
            const target = e.data.song;
            const index = songs.findIndex(s =>
                s.title === target.title &&
                s.artist === target.artist &&
                s.youtubeLink === target.youtubeLink
            );
            if (index !== -1) {
                playSong(index);
            } else {
                playSong(0); // fallback
            }
        }
    } else if (e.data && e.data.action === 'togglePlay') {
        togglePlay();
    } else if (e.data && e.data.action === 'next') {
        nextSong();
    } else if (e.data && e.data.action === 'prev') {
        prevSong();
    }
});
function notifyDashboard(song, playing) {
    window.parent.postMessage({
        action: 'nowPlaying',
        title: song.title,
        artist: song.artist,
        playing: playing
    }, '*');
}
    async function loadSongs() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error('Fetch failed');
            songs = await res.json();
        } catch (e) { console.warn('Could not load songs.', e); }
        renderList();
    }

    function extractYouTubeID(url) {
        if (!url) return null;
        let id = "";
        if (url.includes("v=")) id = url.split("v=")[1]?.split("&")[0] || "";
        else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1]?.split("?")[0] || "";
        return id || null;
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function renderList() {
        const q = document.getElementById("search")?.value?.toLowerCase() || "";
        const filtered = songs.filter(s =>
            (s.title || '').toLowerCase().includes(q) ||
            (s.artist || '').toLowerCase().includes(q)
        );
        songListEl.innerHTML = filtered.map(s => {
            const idx = songs.indexOf(s);
            return `
                <div class="song-item" onclick="playSong(${idx})">
                    <div class="song-thumb"><i class="fa-solid fa-music"></i></div>
                    <div class="song-info">
                        <div class="song-title">${escapeHTML(s.title || 'Untitled')}</div>
                        <div class="song-artist">${escapeHTML(s.artist || 'Unknown')}</div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteSong(${s.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `;
        }).join("");
    }

    // ── Delete without popup ──
    async function deleteSong(id) {
        try { await fetch(`${API}/${id}`, { method: 'DELETE' }); } catch (e) {}
        const deletedIndex = songs.findIndex(s => s.id === id);
        songs = songs.filter(s => s.id !== id);
        // If the deleted song was the currently playing one, stop playback
        if (currentIndex === deletedIndex) {
            currentIndex = -1;
            clearAllPlayer();
        } else if (currentIndex > deletedIndex) {
            currentIndex--; // adjust index since array shrunk
        }
        renderList();
    }

    function playSong(index) {
        if (index < 0 || index >= songs.length) { clearAllPlayer(); return; }
        currentIndex = index;
        const song = songs[index];

        miniTitle.textContent = song.title || 'Untitled';
        miniArtist.textContent = song.artist || 'Unknown';

        npTitle.textContent = song.title || 'Untitled';
        npArtist.textContent = song.artist || 'Unknown';
        if (song.note && song.note.trim()) {
            npNote.textContent = `📝 ${song.note}`;
            npNote.classList.add('visible');
        } else {
            npNote.textContent = '';
            npNote.classList.remove('visible');
        }

        const videoId = extractYouTubeID(song.youtubeLink);
        if (videoId) {
            createPlayer(videoId);
        } else {
            if (ytPlayer) { ytPlayer.destroy(); ytPlayer = null; isPlayerReady = false; }
            videoContainer.innerHTML = '';
            videoContainer.classList.add('empty');
            updatePlayIcons(false);
        }
    }

    function clearAllPlayer() {
        miniTitle.textContent = 'Nothing playing';
        miniArtist.textContent = 'Queue a song to begin';
        npTitle.textContent = 'Select a song';
        npArtist.textContent = '';
        npNote.textContent = '';
        npNote.classList.remove('visible');
        if (ytPlayer) { ytPlayer.destroy(); ytPlayer = null; isPlayerReady = false; }
        videoContainer.innerHTML = '';
        videoContainer.classList.add('empty');
        updatePlayIcons(false);
    }

    // ── Shuffle ──
    function toggleShuffle() {
        shuffleMode = !shuffleMode;
        const btn = document.getElementById("shuffleBtn");
        if (shuffleMode) {
            btn.classList.add("active");
            buildShuffleQueue();
        } else {
            btn.classList.remove("active");
            shuffleQueue = [];
        }
    }

    function buildShuffleQueue() {
        // Create a shuffled copy of indices, excluding the current song
        const indices = songs.map((_, i) => i).filter(i => i !== currentIndex);
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        shuffleQueue = indices;
    }

    function nextSong() {
        if (songs.length === 0) return;
        if (shuffleMode) {
            if (shuffleQueue.length === 0) buildShuffleQueue();
            if (shuffleQueue.length > 0) {
                const nextIdx = shuffleQueue.shift();
                playSong(nextIdx);
                return;
            }
        }
        // Normal sequential
        const nextIdx = currentIndex < songs.length - 1 ? currentIndex + 1 : 0;
        playSong(nextIdx);
    }

    function prevSong() {
        if (songs.length === 0) return;
        if (shuffleMode) {
            // Just go back to previous in order (simpler)
            const prevIdx = currentIndex > 0 ? currentIndex - 1 : songs.length - 1;
            playSong(prevIdx);
            return;
        }
        const prevIdx = currentIndex > 0 ? currentIndex - 1 : songs.length - 1;
        playSong(prevIdx);
    }

    function openPlayerScreen() { if (currentIndex === -1) return; playerScreen.classList.add('active'); }
    function closePlayerScreen() { playerScreen.classList.remove('active'); }

    let touchStartY = 0;
    playerScreen.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: false});
    playerScreen.addEventListener('touchmove', e => {
        const y = e.touches[0].clientY;
        if (y - touchStartY > 70 && playerScreen.scrollTop === 0) closePlayerScreen();
    }, {passive: false});

    // ── Add form ──
    document.getElementById("showAddForm").addEventListener("click", () => {
        document.getElementById("formOverlay").classList.add("active");
        document.getElementById("titleInput").value = '';
        document.getElementById("artistInput").value = '';
        document.getElementById("youtubeInput").value = '';
        document.getElementById("noteInput").value = '';
        document.getElementById("fetchStatus").classList.remove("visible");
    });
    document.getElementById("cancelForm").addEventListener("click", () => {
        document.getElementById("formOverlay").classList.remove("active");
    });
    document.getElementById("formOverlay").addEventListener("click", e => {
        if (e.target === document.getElementById("formOverlay"))
            document.getElementById("formOverlay").classList.remove("active");
    });
    document.getElementById("saveForm").addEventListener("click", addSong);

    async function addSong() {
        const title = document.getElementById("titleInput").value.trim();
        const artist = document.getElementById("artistInput").value.trim();
        const youtube = document.getElementById("youtubeInput").value.trim();
        const note = document.getElementById("noteInput").value.trim();

        if (!title && !youtube) {
            alert("Please enter at least a title or a YouTube link.");
            return;
        }

        const song = {
            title: title || 'Untitled',
            artist: artist || 'Unknown',
            youtubeLink: youtube || '',
            note: note || ''
        };

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(song)
            });
            if (!res.ok) throw new Error('Add failed');
        } catch (e) {
            console.warn('API add failed. Appending locally.', e);
            song.id = Date.now();
            songs.push(song);
        }

        document.getElementById("formOverlay").classList.remove("active");
        await loadSongs();
        // ❌ Do NOT auto‑play the newly added song
    }

    loadSongs();
</script>
</body>

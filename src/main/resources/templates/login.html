<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Space · Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #070709;
            --bg-card: rgba(24, 24, 32, 0.85);
            --text-primary: #eeeef2;
            --text-secondary: #b0b0bb;
            --text-muted: #787882;
            --border-subtle: #22222d;
            --border-card: #1e1e2a;
            --mustard: #e0a83b;
            --mustard-glow: rgba(224, 168, 59, 0.35);
            --rehema: #5db8d4;
            --collins: #3cb878;
            --accent-gradient: linear-gradient(135deg, #e0a83b, #c48f28);
            --radius-xl: 24px;
            --radius-md: 10px;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.7);
            --transition-bounce: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
        }

        /* Matrix background – unchanged */
        .jp-matrix {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));
            grid-auto-rows: 35px;
            justify-content: center; align-content: center;
            font-size: 20px; color: rgba(0,150,255,0.4);
            font-family: "Courier New", Courier, monospace;
            opacity: 0.18; pointer-events: none; user-select: none;
        }
        .jp-matrix > span {
            text-align: center;
            text-shadow: 0 0 5px rgba(0,150,255,0.5);
            line-height: 1; display: block;
        }
        .jp-matrix > span:nth-child(19n+2) { animation: smooth-pulse 3.5s ease-in-out infinite 0.2s; }
        .jp-matrix > span:nth-child(29n+1) { animation: smooth-pulse 4.1s ease-in-out infinite 0.7s; }
        .jp-matrix > span:nth-child(11n) {
            color: rgba(100,200,255,0.7);
            animation: smooth-pulse 2.9s ease-in-out infinite 1.1s;
        }
        .jp-matrix > span:nth-child(37n+10) { animation: smooth-pulse 5.3s ease-in-out infinite 1.5s; }
        .jp-matrix > span:nth-child(41n+1) { animation: smooth-pulse 3.9s ease-in-out infinite 0.4s; }
        .jp-matrix > span:nth-child(17n+9) { animation: smooth-pulse 2.8s ease-in-out infinite 0.9s; }
        .jp-matrix > span:nth-child(23n+18) { animation: smooth-pulse 4.3s ease-in-out infinite 1.3s; }
        .jp-matrix > span:nth-child(31n+4) { animation: smooth-pulse 5.6s ease-in-out infinite 0.1s; }
        .jp-matrix > span:nth-child(43n+20) { animation: smooth-pulse 3.6s ease-in-out infinite 1.8s; }
        .jp-matrix > span:nth-child(13n+6) { animation: smooth-pulse 3.2s ease-in-out infinite 1.2s; }
        .jp-matrix > span:nth-child(53n+5) { animation: smooth-pulse 4.9s ease-in-out infinite 0.5s; }
        .jp-matrix > span:nth-child(47n+15) { animation: smooth-pulse 5.9s ease-in-out infinite 1s; }

        @keyframes smooth-pulse {
            0%,100% { color: rgba(0,150,255,0.4); text-shadow: 0 0 5px rgba(0,150,255,0.5); }
            30% { color: rgba(100,200,255,1); text-shadow: 0 0 10px rgba(100,200,255,1), 0 0 15px rgba(100,200,255,1); }
            50% { color: rgba(255,105,180,1); text-shadow: 0 0 10px rgba(255,105,180,1), 0 0 15px rgba(255,105,180,1); }
            70% { color: #ffffff; text-shadow: 0 0 10px #fff, 0 0 15px #fff, 0 0 20px #fff; }
        }

        .bg-glow {
            position: fixed; border-radius: 50%; filter: blur(80px);
            opacity: 0.12; pointer-events: none; z-index: 0;
        }
        .glow-blue {
            background: var(--rehema);
            width: 250px; height: 250px; top: -50px; left: -80px;
            animation: float1 8s ease-in-out infinite;
        }
        .glow-green {
            background: var(--collins);
            width: 300px; height: 300px; bottom: -80px; right: -60px;
            animation: float2 10s ease-in-out infinite;
        }
        @keyframes float1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,20px) scale(1.1); }
        }
        @keyframes float2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-20px,-15px) scale(1.2); }
        }

        /* Login card */
        .login-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 380px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-card);
            padding: 36px 28px 32px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeInUp 0.6s ease;
            margin: 0 auto;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, var(--rehema), var(--collins), var(--mustard));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            font-size: 1.8rem; color: #000;
            box-shadow: 0 8px 24px rgba(93,184,212,0.3);
        }

        h1 {
            font-size: 1.8rem; font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em; margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.9rem; color: var(--text-muted);
            margin-bottom: 20px; line-height: 1.4;
        }

        /* User toggle */
        .user-toggle {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 22px;
        }
        .user-btn {
            flex: 1; padding: 12px 0; border-radius: 30px;
            background: rgba(26,26,36,0.8);
            border: 1.5px solid var(--border-subtle);
            color: var(--text-secondary);
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .user-btn.active.rehema-active {
            background: rgba(93,184,212,0.15);
            border-color: var(--rehema);
            color: var(--rehema);
            box-shadow: 0 0 20px rgba(93,184,212,0.3);
        }
        .user-btn.active.collins-active {
            background: rgba(60,184,120,0.15);
            border-color: var(--collins);
            color: var(--collins);
            box-shadow: 0 0 20px rgba(60,184,120,0.3);
        }

        /* Input group with password toggle */
        .input-group {
            position: relative; margin-bottom: 18px;
        }
        .input-group i.fa-lock {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); font-size: 1rem;
            transition: color 0.3s;
            z-index: 1;
        }
        .input-group input {
            width: 100%;
            padding: 14px 44px 14px 44px;  /* space for lock icon on left, eye icon on right */
            background: rgba(26,26,36,0.8);
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.25s;
            backdrop-filter: blur(4px);
        }
        .input-group input:focus {
            border-color: var(--mustard);
            box-shadow: 0 0 0 4px rgba(224,168,59,0.08);
        }
        .input-group input:focus + i.fa-lock,
        .input-group input:focus ~ i.fa-lock {
            color: var(--mustard);
        }

        .toggle-password {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
            z-index: 1;
            transition: color 0.3s;
        }
        .toggle-password:hover { color: var(--text-primary); }

        .btn-login {
            width: 100%; padding: 14px;
            border: none; border-radius: var(--radius-md);
            background: var(--accent-gradient);
            color: #1a1000;
            font-weight: 700; font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-bounce);
            box-shadow: 0 6px 20px rgba(224,168,59,0.3);
            letter-spacing: 0.01em;
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(224,168,59,0.5);
            filter: brightness(1.08);
        }
        .btn-login:active { transform: scale(0.97); }

        .error-message {
            color: #ff5e5e; font-size: 0.85rem;
            margin-top: 12px; min-height: 20px;
        }
        .hint {
            color: var(--text-muted); font-size: 0.75rem;
            margin-top: 18px; opacity: 0.7;
        }

        @media (max-width: 400px) {
            .login-container { padding: 28px 20px 24px; }
            h1 { font-size: 1.5rem; }
            .user-btn { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="jp-matrix" id="matrixContainer"></div>
    <div class="bg-glow glow-blue"></div>
    <div class="bg-glow glow-green"></div>

    <div class="login-container">
        <div class="login-icon"><i class="fa-solid fa-heart"></i></div>
        <h1>Our Space</h1>
        <p class="subtitle">Who's coming in right now?</p>

        <!-- User toggle -->
        <div class="user-toggle" id="userToggle">
            <button class="user-btn active rehema-active" data-user="Rehema">
                <i class="fa-solid fa-gem"></i> Rehema
            </button>
            <button class="user-btn" data-user="Collins">
                <i class="fa-solid fa-leaf"></i> Collins
            </button>
        </div>

        <form action="/login" method="post">
            <input type="hidden" name="username" id="usernameInput" value="Rehema">

            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Password" required autofocus>
                <i class="fa-solid fa-lock"></i>
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Enter
            </button>
        </form>

        <div class="error-message" id="errorMessage"></div>
        <div class="hint">💛 Rehema & Collins forever</div>
    </div>

    <script>
        // User toggle
        const userBtns = document.querySelectorAll('.user-btn');
        const usernameInput = document.getElementById('usernameInput');

        userBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                userBtns.forEach(b => b.classList.remove('active', 'rehema-active', 'collins-active'));
                const user = this.dataset.user;
                this.classList.add('active');
                if (user === 'Rehema') {
                    this.classList.add('rehema-active');
                } else {
                    this.classList.add('collins-active');
                }
                usernameInput.value = user;
            });
        });

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            if (type === 'text') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // Matrix generation
        (function generateMatrix() {
            const container = document.getElementById('matrixContainer');
            const cols = Math.floor(window.innerWidth / 35);
            const rows = Math.floor(window.innerHeight / 35);
            const total = cols * rows;
            const chars = ['0','1','♥','✦','♦','♡','·',':','.',',','~'];
            let html = '';
            for (let i = 0; i < total; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                html += `<span>${char}</span>`;
            }
            container.innerHTML = html;
        })();

        // Error message
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'true') {
            document.getElementById('errorMessage').textContent = 'Wrong password for that person. Try again.';
        }
    </script>
</body>
</html>

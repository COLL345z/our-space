spring.application.name=demo

spring.datasource.url=jdbc:postgresql://ep-young-king-aiacqbfk.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

upload.dir=uploads/

# Multipart settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ⭐ THIS IS THE CRITICAL ONE YOU'RE MISSING
# Tomcat's own limit for POST requests (default is only 2MB!)
server.tomcat.max-http-form-post-size=50MB

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
